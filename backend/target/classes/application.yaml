spring:
  application:
    name: student-id-system

  datasource:
    url: jdbc:mariadb://localhost:3306/student_id_card_db
    username: root
    password: 12345678
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080